name: Update Telegram Posts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 jdatetime pytz
        
      - name: Run Scraper
        run: python scraper.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "Scraper-Bot"
          git config --global user.email "bot@github.com"
          git add output1.txt output2.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update outputs" && git push)
